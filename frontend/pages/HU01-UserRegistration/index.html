<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="toast-container" class="toast-container"></div>
<div class="register">
<div class="nav">
  <div class="logo" onclick="window.location.href='../HU02-Homepage/index.html'">
    <img src="../../assets/icons/logoParkea.png" alt="Logo parkea">
  </div>
</div>
    <div class="titulo">Crear Cuenta</div>
    <form>
        <div class="campo">
            <label>Tipo de documento</label>
            <input type="text" placeholder="C.C">
        </div>
        <div class="campo">
            <label>Numero de documento</label>
            <input type="number" placeholder="">
        </div>
        <div class="campo">
            <label>Nombre completo</label>
            <input type="text" placeholder="Juan perez">
        </div>
        <div class="campo">
            <label>Correo electronico</label>
            <input type="email" placeholder="usuario@gmail.com">
        </div>
        <div class="campo">
            <label>Contraseña</label>
            <input type="password" placeholder="xxxxxxxxxxxxxxx">
        </div>
        <div class="campo">
            <label>Confirmar contraseña</label>
            <input type="password" placeholder="xxxxxxxxxxxxxxx">
        </div>
        <div class="campo">
            <label>Telefono</label>
            <input type="number">
        </div>
        <button type="submit" class="boton" onclick="window.location.href='../HU03-HomepageCitizen/index.html'">Crear cuenta</button>
        <div class="login">
            <p onclick="window.location.href='../HU05-UserLogin/index.html'">¿Ya tiene cuenta? Inicia sesión</p> 
        </div>
    </form>
</div>
<script src="script.js"></script>
</body>
</html>
