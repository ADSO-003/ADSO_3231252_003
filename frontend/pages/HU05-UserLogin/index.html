<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Usuario</title>
    <link rel="stylesheet" href="HU006.css">
</head>
   
<body>

    <div class="container">

        <!-- 🔵 AC-3: Botón administrador -->
        <button class="admin-btn">¿Iniciar como administrador?</button>

        <!-- AC-1: Logo -->
        <div class="logo">
            <img src="img/logo.jpeg" alt="Logo">
        </div>

        <!-- AC-1: Título -->
        <h2>Iniciar Sesión</h2>

        <!-- AC-1: Formulario -->
        <form id="loginForm">

            <!-- AC-1: Correo -->
            <label>Correo electrónico</label>
            <div class="input-group">
                <span class="icon">✉</span>
                <input id="correo" type="email" placeholder="usuario@ejemplo.com">
            </div>

            <!-- AC-1 y 5: Contraseña -->
            <label>Contraseña</label>
            <div class="input-group">
                <span class="icon">🔒</span>
                <input id="password" type="password" placeholder="xxxxxxxxxxxx">
           </div>

            <!-- AC-10: Botón login -->
            <button type="submit" class="login-btn">Iniciar Sesión</button>

        </form>
