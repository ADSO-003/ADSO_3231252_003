<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestión de Perfil</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="perfil-container">

<h2>Gestión de Perfil</h2>

<form>

<label>Nombre completo</label>
<input type="text" id="nombre">

<label>Teléfono</label>
<input type="text" id="telefono">

<label>Correo electrónico</label>
<input type="email" id="correo" disabled>

<label>Foto de perfil</label>
<input type="file" id="foto">

<label>Contraseña actual</label>
<input type="password" id="passwordActual">

<label>Nueva contraseña</label>
<input type="password" id="passwordNueva">

<label>Confirmar contraseña</label>
<input type="password" id="passwordConfirmar">

<button type="button" onclick="guardarCambios()" class="btn-guardar">
Guardar cambios
</button>
</form>

</div>

<script src="script.js"></script>

</body>

</html>
